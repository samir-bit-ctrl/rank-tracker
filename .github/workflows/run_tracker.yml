name: Rank Tracker

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST = 2:30 AM UTC
  workflow_dispatch:         # allows manual trigger from GitHub UI

permissions:
  contents: write            # needed to push dashboard to gh-pages

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rank tracker
        env:
          GSC_CREDENTIALS:    ${{ secrets.GSC_CREDENTIALS }}
          SHEET_ID:           ${{ secrets.SHEET_ID }}
          SITE_URL:           ${{ secrets.SITE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TEAMS_WEBHOOK_URL:  ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python main.py

      - name: Commit history back to main
        run: |
          git config user.name  "rank-tracker-bot"
          git config user.email "bot@studyriserr.com"
          git config advice.addIgnoredFile false
          git add -f data/history.json
          git status
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update rank history $(date +'%Y-%m-%d')"
          git push origin main || echo "Nothing to push"

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./dashboard
          publish_branch: gh-pages