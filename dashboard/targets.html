<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Target Keywords — studyriserr.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb-bg:#0f1117;--sb-border:#1e2330;--sb-text:#94a3b8;--sb-active:#f8fafc;
  --sb-hover:#1e2330;--sb-accent:#3b82f6;
  --bg:#f4f6f9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text-muted:#64748b;--text-dim:#94a3b8;
  --green:#10b981;--green-bg:#d1fae5;--red:#ef4444;--red-bg:#fee2e2;
  --amber:#f59e0b;--amber-bg:#fef3c7;--blue:#3b82f6;--blue-bg:#dbeafe;
  --purple:#8b5cf6;--purple-bg:#ede9fe;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --sb-w:240px;--radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sidebar{width:var(--sb-w);background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--sb-border)}
.sb-logo-mark{width:36px;height:36px;background:var(--sb-accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:#fff;margin-bottom:10px}
.sb-site{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--sb-active);letter-spacing:-.2px}
.sb-tagline{font-size:10px;color:var(--sb-text);margin-top:2px;font-family:var(--font-mono)}
.sb-nav{padding:16px 12px;flex:1}
.sb-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sb-text);padding:0 8px;margin:16px 0 6px;opacity:.6}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--sb-text);text-decoration:none;font-size:12.5px;font-weight:500;transition:all .15s;margin-bottom:2px}
.sb-nav a:hover{background:var(--sb-hover);color:var(--sb-active)}
.sb-nav a.active{background:rgba(59,130,246,.15);color:var(--sb-accent)}
.sb-nav a .icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.sb-nav a.active .icon{opacity:1}
.sb-footer{padding:16px 20px;border-top:1px solid var(--sb-border)}
.sb-updated{font-size:10px;color:var(--sb-text);font-family:var(--font-mono);opacity:.7}
.sb-health{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.sb-health-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--sb-text);opacity:.8;margin-bottom:4px}
.sb-health-score{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--sb-accent);line-height:1}
.sb-health-sub{font-size:10px;color:var(--sb-text);margin-top:3px}
.main{margin-left:var(--sb-w);flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:12px}
.refresh-badge{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.pulse{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:28px 32px 48px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--blue));opacity:.7}
.stat-card.green{--card-color:var(--green)}.stat-card.red{--card-color:var(--red)}.stat-card.amber{--card-color:var(--amber)}.stat-card.purple{--card-color:var(--purple)}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:var(--font-mono)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.2px}
.chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px}
.chart-wrap{position:relative;height:220px}
.chart-wrap.tall{height:280px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.panel-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.panel-badge{font-size:10px;font-family:var(--font-mono);background:var(--surface);color:var(--text-muted);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 14px;color:var(--text-muted);vertical-align:middle}
td.bold{color:var(--text);font-weight:500}
td.mono{font-family:var(--font-mono);font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.badge.green{color:var(--green);background:var(--green-bg)}.badge.red{color:var(--red);background:var(--red-bg)}.badge.amber{color:var(--amber);background:var(--amber-bg)}.badge.blue{color:var(--blue);background:var(--blue-bg)}.badge.grey{color:var(--text-muted);background:var(--surface2);border:1px solid var(--border)}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:22px;border-radius:5px;font-family:var(--font-mono);font-size:11px;font-weight:500}
.pos-1{background:#fef3c7;color:#92400e}.pos-top3{background:#d1fae5;color:#065f46}.pos-top10{background:#dbeafe;color:#1e40af}.pos-top20{background:#fef9c3;color:#854d0e}.pos-low{background:#fee2e2;color:#991b1b}
.delta{font-family:var(--font-mono);font-size:11px;font-weight:500;padding:2px 6px;border-radius:4px}
.delta.up{color:var(--green);background:var(--green-bg)}.delta.down{color:var(--red);background:var(--red-bg)}.delta.neutral{color:var(--text-muted);background:var(--surface2)}
.controls{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:12px;padding:7px 12px 7px 32px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text-dim)}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-body);font-size:11px;padding:6px 14px;border-radius:var(--radius);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--blue);color:var(--blue)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.page-btns{display:flex;gap:4px}
.page-btn{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover,.page-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-muted);font-size:13px;flex-direction:column;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in:nth-child(1){animation-delay:.05s}.fade-in:nth-child(2){animation-delay:.10s}.fade-in:nth-child(3){animation-delay:.15s}.fade-in:nth-child(4){animation-delay:.20s}.fade-in:nth-child(5){animation-delay:.25s}

/* Seed group card */
.seed-group{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:12px;
  box-shadow:var(--shadow);overflow:hidden;
}
.seed-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;cursor:pointer;
  transition:background .15s;
  border-bottom:1px solid transparent;
}
.seed-header:hover{background:var(--surface2)}
.seed-header.open{border-bottom-color:var(--border);background:var(--surface2)}
.seed-name{
  font-family:var(--font-display);font-size:14px;font-weight:700;
  color:var(--text);flex:1;letter-spacing:-.2px;
}
.seed-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.seed-variants{display:none;padding:0}
.seed-variants.open{display:block}
.expand-icon{
  width:20px;height:20px;border-radius:4px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text-muted);
  transition:transform .2s;flex-shrink:0;
}
.seed-header.open .expand-icon{transform:rotate(180deg)}

/* Sparkline */
.spark-wrap{display:flex;align-items:center;gap:2px}
.spark-bar{
  width:6px;border-radius:2px 2px 0 0;
  transition:opacity .15s;
}
.spark-bar:hover{opacity:.7}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">SR</div>
    <div class="sb-site">studyriserr.com</div>
    <div class="sb-tagline">SEO Intelligence Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Overview</div>
    <a href="index.html">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      SEO Overview
    </a>
    <div class="sb-section">Analysis</div>
    <a href="targets.html" class="active">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      Target Keywords
    </a>
    <a href="ai-overview.html">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
      AI Overview
    </a>
    <div class="sb-section">Intelligence</div>
    <a href="seo-advice.html">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      SEO Advice
    </a>
  </nav>
  <div class="sb-footer">
    <div class="sb-updated" id="sb-updated">Loading...</div>
    <div class="sb-health">
      <div class="sb-health-label">Health Score</div>
      <div class="sb-health-score" id="sb-score">—</div>
      <div class="sb-health-sub" id="sb-label">—</div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">🎯 Target Keywords</div>
    <div class="topbar-right">
      <span class="refresh-badge"><span class="pulse"></span><span id="refresh-countdown">5:00</span></span>
    </div>
  </div>
  <div class="content" id="page-content">
    <div class="loading"><div class="spinner"></div>Loading target keywords...</div>
  </div>
</div>

<script>
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size   = 11;
Chart.defaults.color       = '#64748b';

let countdown = 300;
setInterval(() => {
  countdown--;
  if (countdown <= 0) { location.reload(); return; }
  const m = Math.floor(countdown/60), s = countdown%60;
  const el = document.getElementById('refresh-countdown');
  if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}, 1000);

function posBadge(pos) {
  if (pos === '—' || pos === null || pos === undefined) return `<span class="pos-badge pos-low">—</span>`;
  const p = parseFloat(pos);
  const cls = p <= 1 ? 'pos-1' : p <= 3 ? 'pos-top3' : p <= 10 ? 'pos-top10' : p <= 20 ? 'pos-top20' : 'pos-low';
  return `<span class="pos-badge ${cls}">${p}</span>`;
}

function deltaBadge(d) {
  if (!d || d === 0) return `<span class="delta neutral">—</span>`;
  return `<span class="delta ${d > 0 ? 'up' : 'down'}">${d > 0 ? '+' : ''}${d}</span>`;
}

function statusBadge(s) {
  if (!s) return '';
  const map = {
    'Top 3':'green','Top 10':'blue','Page 2':'amber',
    'Rising':'green','Falling':'red','Stable':'grey',
    'Not Ranking':'red'
  };
  const key = Object.keys(map).find(k => s.includes(k)) || 'grey';
  return `<span class="badge ${map[key]}">${s}</span>`;
}

function oppBadge(o) {
  if (!o) return '';
  const map = {
    'Maintain':'green','Optimize':'amber','structured':'blue',
    'Not ranking':'red','Keep':'green','On Track':'grey'
  };
  const key = Object.keys(map).find(k => o.includes(k)) || 'grey';
  return `<span class="badge ${map[key]}">${o}</span>`;
}

function consistBadge(c) {
  if (!c) return '';
  if (c.includes('Very Stable')) return `<span class="badge green">${c}</span>`;
  if (c.includes('Moderate'))    return `<span class="badge amber">${c}</span>`;
  if (c.includes('Volatile'))    return `<span class="badge red">${c}</span>`;
  return `<span class="badge grey">${c}</span>`;
}

function sparkline(trend) {
  const vals = (trend || []).filter(v => v !== null);
  if (!vals.length) return '<span style="color:var(--text-dim);font-size:10px">no data</span>';
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  return `<div class="spark-wrap">` +
    (trend || []).map(v => {
      if (v === null) return `<div class="spark-bar" style="height:4px;background:var(--border)"></div>`;
      const h = Math.max(4, Math.round(((max - v) / range) * 28) + 4);
      const color = v <= 3 ? '#f59e0b' : v <= 10 ? '#10b981' : v <= 20 ? '#3b82f6' : '#ef4444';
      return `<div class="spark-bar" style="height:${h}px;background:${color}" title="Pos ${v}"></div>`;
    }).join('') +
  `</div>`;
}

async function loadPage() {
  try {
    const [tr, or_] = await Promise.all([
      fetch('data/targets.json?t=' + Date.now()).then(r => r.json()),
      fetch('data/overview.json?t=' + Date.now()).then(r => r.json()),
    ]);

    // Sidebar
    document.getElementById('sb-updated').textContent = 'Updated ' + or_.updated;
    document.getElementById('sb-score').textContent   = or_.health.score + '/100';
    document.getElementById('sb-label').textContent   = or_.health.label;
    document.getElementById('sb-score').style.color   = or_.health.score >= 80 ? '#10b981' : or_.health.score >= 60 ? '#f59e0b' : '#ef4444';

    render(tr);
  } catch(e) {
    document.getElementById('page-content').innerHTML = `
      <div class="loading"><div style="font-size:32px">⚠️</div>
      <div>No target data yet. Add keywords to 🎯 Target Keywords sheet and run <code>python main.py</code></div></div>`;
  }
}

function render(d) {
  const s = d.summary || {};
  const groups = d.keywords || [];

  // All individual variants flat
  const allVariants = groups.flatMap(g => g.variants || []);

  document.getElementById('page-content').innerHTML = `
    <!-- Summary cards -->
    <div class="stat-grid">
      <div class="stat-card fade-in">
        <div class="stat-label">Seed Keywords</div>
        <div class="stat-value">${s.total_seeds || 0}</div>
        <div class="stat-sub">${s.total_variants || 0} total variants</div>
      </div>
      <div class="stat-card green fade-in">
        <div class="stat-label">In Top 3</div>
        <div class="stat-value" style="color:var(--amber)">${s.top3 || 0}</div>
        <div class="stat-sub">target keywords</div>
      </div>
      <div class="stat-card blue fade-in">
        <div class="stat-label">In Top 10</div>
        <div class="stat-value" style="color:var(--green)">${s.top10 || 0}</div>
        <div class="stat-sub">page 1 rankings</div>
      </div>
      <div class="stat-card red fade-in">
        <div class="stat-label">Not Ranking</div>
        <div class="stat-value" style="color:var(--red)">${s.not_ranking || 0}</div>
        <div class="stat-sub">need attention</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-grid" style="margin-bottom:24px">
      <div class="chart-card fade-in">
        <div class="chart-title">🎯 Target Keyword Position Distribution</div>
        <div class="chart-sub">where your target keywords currently rank</div>
        <div class="chart-wrap"><canvas id="targetZoneChart"></canvas></div>
      </div>
      <div class="chart-card fade-in">
        <div class="chart-title">🏆 Top Target Keywords by Clicks</div>
        <div class="chart-sub">7-day click performance</div>
        <div class="chart-wrap tall"><canvas id="targetClickChart"></canvas></div>
      </div>
    </div>

    <!-- Seed groups -->
    <div style="margin-bottom:14px">
      <div style="font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:4px">
        Seed Groups
      </div>
      <div style="font-size:11px;color:var(--text-muted)">
        Click any seed to expand all variants — ranked by best position
      </div>
    </div>

    <div id="seed-groups">
      ${groups.map((g,gi) => renderSeedGroup(g, gi)).join('')}
    </div>

    <!-- Full variant table -->
    <div class="panel fade-in" style="margin-top:24px">
      <div class="panel-header">
        <span class="panel-title">📋 All Target Variants</span>
        <span class="panel-badge" id="var-count">${allVariants.length} keywords</span>
      </div>
      <div class="controls">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" type="text" id="varSearch" placeholder="Search target keywords..."/>
        </div>
        <button class="filter-btn active" onclick="filterVars('all',this)">All</button>
        <button class="filter-btn" onclick="filterVars('top3',this)">Top 3</button>
        <button class="filter-btn" onclick="filterVars('top10',this)">Top 10</button>
        <button class="filter-btn" onclick="filterVars('dropping',this)">Dropping</button>
        <button class="filter-btn" onclick="filterVars('volatile',this)">Volatile</button>
        <button class="filter-btn" onclick="filterVars('norank',this)">Not Ranking</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Keyword</th>
              <th>Seed</th>
              <th>Position</th>
              <th>Change</th>
              <th>Best (7d)</th>
              <th>Clicks</th>
              <th>Impressions</th>
              <th>CTR</th>
              <th>Trend (7d)</th>
              <th>Consistency</th>
              <th>Opportunity</th>
            </tr>
          </thead>
          <tbody id="varBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="var-page-info">Showing 1–25</span>
        <div class="page-btns" id="var-pages"></div>
      </div>
    </div>
  `;

  // Draw charts
  const zoneData = {
    'Top 3':  allVariants.filter(v => parseFloat(v.position) <= 3).length,
    '4-10':   allVariants.filter(v => { const p=parseFloat(v.position); return p>3&&p<=10; }).length,
    '11-20':  allVariants.filter(v => { const p=parseFloat(v.position); return p>10&&p<=20; }).length,
    '20+':    allVariants.filter(v => parseFloat(v.position) > 20).length,
    'N/A':    allVariants.filter(v => v.position === '—' || !v.position).length,
  };

  new Chart(document.getElementById('targetZoneChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(zoneData),
      datasets: [{
        data: Object.values(zoneData),
        backgroundColor: ['#f59e0b','#10b981','#3b82f6','#94a3b8','#e2e8f0'],
        borderWidth: 0, hoverOffset: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { position:'right', labels: { padding:16, font:{size:11}, color:'#64748b' } },
        tooltip: { backgroundColor:'#1e293b', titleColor:'#94a3b8', bodyColor:'#f8fafc' }
      }
    }
  });

  const topByClicks = [...allVariants]
    .filter(v => v.clicks > 0)
    .sort((a,b) => b.clicks - a.clicks)
    .slice(0,10);

  new Chart(document.getElementById('targetClickChart'), {
    type: 'bar',
    data: {
      labels: topByClicks.map(v => v.keyword.length > 22 ? v.keyword.slice(0,22)+'…' : v.keyword),
      datasets: [{
        label: 'Clicks',
        data: topByClicks.map(v => v.clicks),
        backgroundColor: 'rgba(16,185,129,.8)',
        borderRadius: 5, borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false},
        tooltip:{backgroundColor:'#1e293b',titleColor:'#94a3b8',bodyColor:'#f8fafc'} },
      scales: {
        x:{ grid:{color:'#f1f5f9'}, ticks:{color:'#94a3b8'} },
        y:{ grid:{display:false}, ticks:{color:'#64748b',font:{size:11}} }
      }
    }
  });

  // Variant table
  window._allVars    = allVariants;
  window._filteredVars = [...allVariants];
  window._varPage    = 1;
  renderVarTable();

  document.getElementById('varSearch').addEventListener('input', () => {
    window._varPage = 1;
    applyVarFilters();
  });

  // Expand/collapse seed groups
  document.querySelectorAll('.seed-header').forEach(h => {
    h.addEventListener('click', () => {
      h.classList.toggle('open');
      const body = h.nextElementSibling;
      body.classList.toggle('open');
    });
  });
}

function renderSeedGroup(g, gi) {
  const bestPos = g.best_position < 999 ? g.best_position : '—';
  const topStatus = g.variants[0]?.status || '';

  return `
    <div class="seed-group fade-in">
      <div class="seed-header">
        <div class="seed-name">🌱 ${g.seed}</div>
        <div class="seed-meta">
          ${posBadge(bestPos)}
          <span class="badge ${g.ranking_count > 0 ? 'green' : 'grey'}">${g.ranking_count}/${g.variants.length} ranking</span>
          <span class="badge blue">${g.total_clicks} clicks</span>
          <span class="badge grey">${g.mode}</span>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="seed-variants">
        <table>
          <thead>
            <tr>
              <th>Keyword</th><th>Position</th><th>Change</th>
              <th>Clicks</th><th>CTR</th><th>Trend</th>
              <th>Status</th><th>Opportunity</th>
            </tr>
          </thead>
          <tbody>
            ${g.variants.map(v => `
              <tr>
                <td class="bold">${v.keyword}</td>
                <td>${posBadge(v.position)}</td>
                <td>${deltaBadge(v.delta)}</td>
                <td class="mono">${v.clicks}</td>
                <td class="mono">${v.ctr}%</td>
                <td>${sparkline(v.trend)}</td>
                <td>${statusBadge(v.status)}</td>
                <td>${oppBadge(v.opportunity)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

let currentVarFilter = 'all';
function filterVars(type, btn) {
  currentVarFilter = type;
  window._varPage  = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyVarFilters();
}

function applyVarFilters() {
  const q = (document.getElementById('varSearch')?.value || '').toLowerCase();
  window._filteredVars = window._allVars.filter(v => {
    const kw  = v.keyword.toLowerCase();
    const pos = parseFloat(v.position);
    const matchQ = !q || kw.includes(q);
    let matchF = true;
    if (currentVarFilter === 'top3')     matchF = pos <= 3;
    if (currentVarFilter === 'top10')    matchF = pos <= 10;
    if (currentVarFilter === 'dropping') matchF = v.delta < 0;
    if (currentVarFilter === 'volatile') matchF = (v.consistency || '').includes('Volatile');
    if (currentVarFilter === 'norank')   matchF = v.position === '—' || !v.position;
    return matchQ && matchF;
  });
  renderVarTable();
}

function renderVarTable() {
  const PAGE = 25;
  const vars = window._filteredVars || [];
  const page = window._varPage || 1;
  const start = (page-1)*PAGE, end = start+PAGE;
  const slice = vars.slice(start, end);

  document.getElementById('varBody').innerHTML = slice.map(v => `
    <tr>
      <td class="bold">${v.keyword}</td>
      <td class="mono" style="color:var(--text-muted)">${v.seed || ''}</td>
      <td>${posBadge(v.position)}</td>
      <td>${deltaBadge(v.delta)}</td>
      <td class="mono">${v.best || '—'}</td>
      <td class="mono">${v.clicks}</td>
      <td class="mono">${v.impressions || 0}</td>
      <td class="mono">${v.ctr}%</td>
      <td>${sparkline(v.trend)}</td>
      <td>${consistBadge(v.consistency)}</td>
      <td>${oppBadge(v.opportunity)}</td>
    </tr>`).join('');

  document.getElementById('var-count').textContent    = `${vars.length} keywords`;
  document.getElementById('var-page-info').textContent =
    `Showing ${Math.min(start+1, vars.length)}–${Math.min(end, vars.length)} of ${vars.length}`;

  const totalPages = Math.ceil(vars.length / PAGE);
  const pageWrap   = document.getElementById('var-pages');
  pageWrap.innerHTML = '';
  for (let i = 1; i <= Math.min(totalPages, 8); i++) {
    const btn = document.createElement('button');
    btn.className   = 'page-btn' + (i === page ? ' active' : '');
    btn.textContent = i;
    btn.onclick     = () => { window._varPage = i; renderVarTable(); };
    pageWrap.appendChild(btn);
  }
}

loadPage();
</script>
</body>
</html>
