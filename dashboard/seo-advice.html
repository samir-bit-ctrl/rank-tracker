<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEO Advice — studyriserr.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sb-bg:#0f1117;--sb-border:#1e2330;--sb-text:#94a3b8;--sb-active:#f8fafc;--sb-hover:#1e2330;--sb-accent:#3b82f6;--bg:#f4f6f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--text-dim:#94a3b8;--green:#10b981;--green-bg:#d1fae5;--red:#ef4444;--red-bg:#fee2e2;--amber:#f59e0b;--amber-bg:#fef3c7;--blue:#3b82f6;--blue-bg:#dbeafe;--purple:#8b5cf6;--purple-bg:#ede9fe;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;--sb-w:240px;--radius:10px;--radius-lg:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.07)}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.sidebar{width:var(--sb-w);background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--sb-border)}
.sb-logo-mark{width:36px;height:36px;background:var(--sb-accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:#fff;margin-bottom:10px}
.sb-site{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--sb-active)}
.sb-tagline{font-size:10px;color:var(--sb-text);margin-top:2px;font-family:var(--font-mono)}
.sb-nav{padding:16px 12px;flex:1}
.sb-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sb-text);padding:0 8px;margin:16px 0 6px;opacity:.6}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--sb-text);text-decoration:none;font-size:12.5px;font-weight:500;transition:all .15s;margin-bottom:2px}
.sb-nav a:hover{background:var(--sb-hover);color:var(--sb-active)}
.sb-nav a.active{background:rgba(59,130,246,.15);color:var(--sb-accent)}
.sb-nav a .icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.sb-footer{padding:16px 20px;border-top:1px solid var(--sb-border)}
.sb-updated{font-size:10px;color:var(--sb-text);font-family:var(--font-mono);opacity:.7}
.sb-health{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.sb-health-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--sb-text);opacity:.8;margin-bottom:4px}
.sb-health-score{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--sb-accent);line-height:1}
.sb-health-sub{font-size:10px;color:var(--sb-text);margin-top:3px}
.main{margin-left:var(--sb-w);flex:1}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.topbar-right{display:flex;gap:10px;align-items:center}
.refresh-badge{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.pulse{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.content{padding:28px 32px 48px}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--text-muted);font-size:13px;flex-direction:column;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Advice sections */
.advice-intro{
  background:linear-gradient(135deg,#0f1117 0%,#1e2d4a 100%);
  border-radius:var(--radius-lg);padding:28px 32px;
  color:#f8fafc;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.advice-intro::before{
  content:'💡';position:absolute;right:24px;top:50%;
  transform:translateY(-50%);font-size:64px;opacity:.1;
}
.advice-intro h2{
  font-family:var(--font-display);font-size:20px;font-weight:800;
  margin-bottom:8px;letter-spacing:-.4px;
}
.advice-intro p{font-size:13px;color:#94a3b8;line-height:1.6}
.advice-meta{
  display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;
}
.advice-meta-item{
  font-size:11px;font-family:var(--font-mono);
  color:#64748b;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  padding:4px 10px;border-radius:6px;
}

.advice-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.advice-section-header{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.advice-icon{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.advice-section-title{
  font-family:var(--font-display);font-size:14px;font-weight:700;
  color:var(--text);letter-spacing:-.2px;
}
.advice-section-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.advice-content{
  font-size:13px;color:var(--text-muted);line-height:1.7;
}
.advice-content p{margin-bottom:10px}
.advice-content p:last-child{margin-bottom:0}
.advice-content strong{color:var(--text);font-weight:600}
.advice-content ul{padding-left:18px;margin-bottom:10px}
.advice-content ul li{margin-bottom:6px}
.advice-content code{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;
  font-family:var(--font-mono);font-size:11px;color:var(--blue);
}

.action-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  margin-bottom:8px;transition:border-color .15s;
}
.action-item:hover{border-color:var(--border2)}
.action-priority{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;white-space:nowrap;padding:3px 8px;
  border-radius:4px;flex-shrink:0;
}
.pri-urgent{color:var(--red);background:var(--red-bg)}
.pri-high{color:var(--amber);background:var(--amber-bg)}
.pri-medium{color:var(--blue);background:var(--blue-bg)}
.pri-opp{color:var(--green);background:var(--green-bg)}
.action-body{flex:1}
.action-keyword{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--font-mono)}
.action-desc{font-size:12px;color:var(--text-muted)}
.action-fix{font-size:11px;color:var(--blue);margin-top:3px}

.streaming-cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--blue);margin-left:2px;
  animation:blink .7s step-end infinite;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">SR</div>
    <div class="sb-site">studyriserr.com</div>
    <div class="sb-tagline">SEO Intelligence Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Overview</div>
    <a href="index.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>SEO Overview</a>
    <div class="sb-section">Analysis</div>
    <a href="targets.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Target Keywords</a>
    <a href="ai-overview.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>AI Overview</a>
    <div class="sb-section">Intelligence</div>
    <a href="seo-advice.html" class="active"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>SEO Advice</a>
  </nav>
  <div class="sb-footer">
    <div class="sb-updated" id="sb-updated">Loading...</div>
    <div class="sb-health"><div class="sb-health-label">Health Score</div><div class="sb-health-score" id="sb-score">—</div><div class="sb-health-sub" id="sb-label">—</div></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">💡 SEO Advice</div>
    <div class="topbar-right">
      <button class="btn btn-primary" id="genBtn" onclick="generateAdvice()">✨ Generate Fresh Advice</button>
      <span class="refresh-badge"><span class="pulse"></span><span id="refresh-countdown">5:00</span></span>
    </div>
  </div>
  <div class="content" id="page-content">
    <div class="loading"><div class="spinner"></div>Loading SEO data...</div>
  </div>
</div>

<script>
let countdown=300;
setInterval(()=>{countdown--;if(countdown<=0){location.reload();return;}const m=Math.floor(countdown/60),s=countdown%60;const el=document.getElementById('refresh-countdown');if(el)el.textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);

let _overview=null,_targets=null,_ai=null;

async function loadPage(){
  try{
    const results=await Promise.allSettled([
      fetch('data/overview.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/targets.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/ai.json?t='+Date.now()).then(r=>r.json()),
    ]);
    _overview=results[0].status==='fulfilled'?results[0].value:null;
    _targets =results[1].status==='fulfilled'?results[1].value:null;
    _ai      =results[2].status==='fulfilled'?results[2].value:null;

    if(_overview){
      document.getElementById('sb-updated').textContent='Updated '+_overview.updated;
      document.getElementById('sb-score').textContent=_overview.health.score+'/100';
      document.getElementById('sb-label').textContent=_overview.health.label;
      document.getElementById('sb-score').style.color=_overview.health.score>=80?'#10b981':_overview.health.score>=60?'#f59e0b':'#ef4444';
    }

    renderShell();

    // Try to load cached advice
    try{
      const cached=await fetch('data/advice.json?t='+Date.now()).then(r=>r.json());
      renderAdvice(cached);
    }catch(e){
      generateAdvice();
    }
  }catch(e){
    document.getElementById('page-content').innerHTML=`<div class="loading"><div>⚠️</div><div>Run <code>python main.py</code> first to generate data.</div></div>`;
  }
}

function renderShell(){
  if(!_overview)return;
  const s=_overview.stats;
  const tSum=_targets?.summary||{};
  document.getElementById('page-content').innerHTML=`
    <div class="advice-intro fade-in">
      <h2>AI-Powered SEO Recommendations</h2>
      <p>Personalized advice for studyriserr.com based on your live GSC data, target keyword performance, and AI Overview status. Focus is on your target keywords first.</p>
      <div class="advice-meta">
        <span class="advice-meta-item">📊 ${s.total_keywords} keywords</span>
        <span class="advice-meta-item">📍 Avg pos ${s.avg_position}</span>
        <span class="advice-meta-item">🎯 ${tSum.total_seeds||0} target seeds</span>
        <span class="advice-meta-item">🤖 ${_ai?.summary?.cited||0} AI citations</span>
        <span class="advice-meta-item">🏥 Health ${_overview.health.score}/100</span>
      </div>
    </div>
    <div id="advice-container">
      <div class="loading"><div class="spinner"></div>Generating advice with AI...</div>
    </div>
  `;
}

async function generateAdvice(){
  const btn=document.getElementById('genBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Generating...';}

  const container=document.getElementById('advice-container');
  if(container){
    container.innerHTML=`<div class="loading"><div class="spinner"></div>Analyzing your SEO data with AI...</div>`;
  }

  // Build context for Claude
  const s=_overview?.stats||{};
  const tSum=_targets?.summary||{};
  const improved=(_overview?.improved||[]).slice(0,5).map(k=>`${k.keyword} (pos ${k.current}, +${k.delta})`).join(', ');
  const dropped=(_overview?.dropped||[]).slice(0,5).map(k=>`${k.keyword} (pos ${k.current}, ${k.delta})`).join(', ');
  const topKws=(_overview?.top_keywords||[]).slice(0,5).map(k=>`${k.keyword} (${k.clicks} clicks, pos ${k.position})`).join(', ');
  const targetSeeds=(_targets?.keywords||[]).map(g=>`${g.seed}: best pos ${g.best_position<999?g.best_position:'not ranking'}, ${g.total_clicks} clicks`).join('; ');
  const aiCited=(_ai?.keywords||[]).filter(k=>k.site_cited).map(k=>k.ai_keyword).join(', ')||'none yet';
  const aiMissed=(_ai?.keywords||[]).filter(k=>k.has_overview&&!k.site_cited).slice(0,5).map(k=>k.ai_keyword).join(', ')||'none';
  const zones=(_overview?.zones||[]).map(z=>`${z.label}: ${z.count} (${z.pct}%)`).join(', ');

  const prompt=`You are an expert SEO consultant analyzing studyriserr.com, an Indian education information website covering exams, colleges, and universities. Their goal is to rank for education-related keywords, collect leads, and do career counseling.

Here is their current SEO data:

OVERALL STATS:
- Total keywords: ${s.total_keywords}
- Average position: ${s.avg_position}
- Total clicks (7d): ${s.total_clicks}
- Avg CTR: ${s.avg_ctr}%
- Top 3 keywords: ${s.top3}
- Top 10 keywords: ${s.top10}
- Health score: ${_overview?.health?.score}/100 (${_overview?.health?.label})

RANK ZONES: ${zones}

TODAY'S MOVERS:
- Improved: ${improved||'none'}
- Dropped: ${dropped||'none'}

TOP KEYWORDS BY CLICKS: ${topKws}

TARGET KEYWORDS (priority focus):
${targetSeeds}

AI OVERVIEW:
- Cited in: ${aiCited}
- Has overview but not cited: ${aiMissed}

Provide specific, actionable SEO advice in exactly this JSON format (no markdown, pure JSON):
{
  "generated_at": "today",
  "health_summary": "2-3 sentences about overall SEO health",
  "sections": [
    {
      "icon": "🎯",
      "title": "Target Keyword Opportunities",
      "subtitle": "Your priority focus areas",
      "color": "#10b981",
      "content": "detailed advice specific to their target keywords",
      "actions": [
        {"priority": "URGENT", "keyword": "keyword name", "issue": "specific issue", "fix": "specific fix"}
      ]
    },
    {
      "icon": "⚡",
      "title": "Quick Wins — CTR Improvements",
      "subtitle": "Pages to fix this week",
      "color": "#f59e0b",
      "content": "advice about CTR optimization",
      "actions": []
    },
    {
      "icon": "📝",
      "title": "Content Gap Strategy",
      "subtitle": "High-impression, low-click pages",
      "color": "#3b82f6",
      "content": "content strategy advice",
      "actions": []
    },
    {
      "icon": "🤖",
      "title": "AI Overview Optimization",
      "subtitle": "Get cited in Google's AI answers",
      "color": "#8b5cf6",
      "content": "specific advice for getting cited in AI overviews for their education niche",
      "actions": []
    },
    {
      "icon": "🔗",
      "title": "Internal Linking Strategy",
      "subtitle": "Push keywords from position 4-10 to top 3",
      "color": "#06b6d4",
      "content": "internal linking advice specific to education website structure",
      "actions": []
    }
  ]
}

Be very specific to their education niche and their actual data. Focus heavily on target keywords.`;

  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await response.json();
    const text=data.content.map(i=>i.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const advice=JSON.parse(clean);
    renderAdvice(advice);
    if(btn){btn.disabled=false;btn.textContent='✨ Generate Fresh Advice';}
  }catch(e){
    renderFallbackAdvice();
    if(btn){btn.disabled=false;btn.textContent='✨ Try Again';}
  }
}

function renderAdvice(advice){
  const container=document.getElementById('advice-container');
  if(!container)return;

  container.innerHTML=`
    <div style="background:var(--green-bg);border:1px solid var(--green);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:12px;color:#065f46;font-family:var(--font-mono)">
      ✅ ${advice.health_summary||'Analysis complete.'}
    </div>
    ${(advice.sections||[]).map(section=>`
      <div class="advice-section fade-in">
        <div class="advice-section-header">
          <div class="advice-icon" style="background:${section.color}20">${section.icon}</div>
          <div>
            <div class="advice-section-title">${section.title}</div>
            <div class="advice-section-sub">${section.subtitle||''}</div>
          </div>
        </div>
        <div class="advice-content">${formatContent(section.content)}</div>
        ${section.actions&&section.actions.length?`
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
            <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:10px">Action Items</div>
            ${section.actions.map(a=>actionItem(a)).join('')}
          </div>`:''
        }
      </div>`).join('')}
    <div style="text-align:center;padding:20px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">
      Generated at ${advice.generated_at||new Date().toLocaleString()} · Powered by Claude AI
    </div>
  `;
}

function formatContent(text){
  if(!text)return'';
  return text.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('');
}

function actionItem(a){
  const priClass={'URGENT':'pri-urgent','HIGH':'pri-high','MEDIUM':'pri-medium','OPPORTUNITY':'pri-opp'}[a.priority]||'pri-medium';
  return`
    <div class="action-item">
      <span class="action-priority ${priClass}">${a.priority}</span>
      <div class="action-body">
        <div class="action-keyword">${a.keyword||''}</div>
        <div class="action-desc">${a.issue||''}</div>
        ${a.fix?`<div class="action-fix">→ ${a.fix}</div>`:''}
      </div>
    </div>`;
}

function renderFallbackAdvice(){
  const container=document.getElementById('advice-container');
  if(!container)return;
  const s=_overview?.stats||{};
  container.innerHTML=`
    <div class="advice-section fade-in">
      <div class="advice-section-header">
        <div class="advice-icon" style="background:#10b98120">🎯</div>
        <div><div class="advice-section-title">Target Keyword Strategy</div><div class="advice-section-sub">Based on your current data</div></div>
      </div>
      <div class="advice-content">
        <p>Your site has <strong>${s.total_keywords} keywords</strong> with an average position of <strong>${s.avg_position}</strong>.</p>
        <p>With <strong>${s.top3} keywords in Top 3</strong> and <strong>${s.top10} in Top 10</strong>, focus on pushing position 4-10 keywords to page 1.</p>
        <p>Your CTR of <strong>${s.avg_ctr}%</strong> — review title tags for keywords with high impressions but low clicks.</p>
      </div>
    </div>
    <div style="text-align:center;padding:16px;font-size:12px;color:var(--text-muted)">
      API call failed. Click "Generate Fresh Advice" to retry with Claude AI.
    </div>`;
}

loadPage();
</script>
</body>
</html>
