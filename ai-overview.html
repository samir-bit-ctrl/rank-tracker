<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Overview — studyriserr.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sb-bg:#0f1117;--sb-border:#1e2330;--sb-text:#94a3b8;--sb-active:#f8fafc;--sb-hover:#1e2330;--sb-accent:#3b82f6;--bg:#f4f6f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--text-dim:#94a3b8;--green:#10b981;--green-bg:#d1fae5;--red:#ef4444;--red-bg:#fee2e2;--amber:#f59e0b;--amber-bg:#fef3c7;--blue:#3b82f6;--blue-bg:#dbeafe;--purple:#8b5cf6;--purple-bg:#ede9fe;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;--sb-w:240px;--radius:10px;--radius-lg:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.07)}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.sidebar{width:var(--sb-w);background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--sb-border)}
.sb-logo-mark{width:36px;height:36px;background:var(--sb-accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;font-weight:800;color:#fff;margin-bottom:10px}
.sb-site{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--sb-active)}
.sb-tagline{font-size:10px;color:var(--sb-text);margin-top:2px;font-family:var(--font-mono)}
.sb-nav{padding:16px 12px;flex:1}
.sb-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sb-text);padding:0 8px;margin:16px 0 6px;opacity:.6}
.sb-nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--sb-text);text-decoration:none;font-size:12.5px;font-weight:500;transition:all .15s;margin-bottom:2px}
.sb-nav a:hover{background:var(--sb-hover);color:var(--sb-active)}
.sb-nav a.active{background:rgba(59,130,246,.15);color:var(--sb-accent)}
.sb-nav a .icon{width:16px;height:16px;opacity:.7;flex-shrink:0}
.sb-footer{padding:16px 20px;border-top:1px solid var(--sb-border)}
.sb-updated{font-size:10px;color:var(--sb-text);font-family:var(--font-mono);opacity:.7}
.sb-health{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.sb-health-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--sb-text);opacity:.8;margin-bottom:4px}
.sb-health-score{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--sb-accent);line-height:1}
.sb-health-sub{font-size:10px;color:var(--sb-text);margin-top:3px}
.main{margin-left:var(--sb-w);flex:1}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-family:var(--font-display);font-size:15px;font-weight:700}
.refresh-badge{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.pulse{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:28px 32px 48px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--blue));opacity:.7}
.stat-card.green{--card-color:var(--green)}.stat-card.red{--card-color:var(--red)}.stat-card.amber{--card-color:var(--amber)}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:var(--font-mono)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-family:var(--font-display);font-size:13px;font-weight:700;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px}
.chart-wrap{position:relative;height:220px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.panel-title{font-family:var(--font-display);font-size:13px;font-weight:700}
.panel-badge{font-size:10px;font-family:var(--font-mono);background:var(--surface);color:var(--text-muted);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;color:var(--text-muted);vertical-align:top}
td.bold{color:var(--text);font-weight:500}
td.mono{font-family:var(--font-mono);font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.badge.green{color:var(--green);background:var(--green-bg)}.badge.red{color:var(--red);background:var(--red-bg)}.badge.amber{color:var(--amber);background:var(--amber-bg)}.badge.blue{color:var(--blue);background:var(--blue-bg)}.badge.grey{color:var(--text-muted);background:var(--surface2);border:1px solid var(--border)}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:22px;border-radius:5px;font-family:var(--font-mono);font-size:11px;font-weight:500}
.pos-top3{background:#d1fae5;color:#065f46}.pos-top10{background:#dbeafe;color:#1e40af}.pos-top20{background:#fef9c3;color:#854d0e}.pos-low{background:#fee2e2;color:#991b1b}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--text-muted);font-size:13px;flex-direction:column;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in:nth-child(1){animation-delay:.05s}.fade-in:nth-child(2){animation-delay:.10s}.fade-in:nth-child(3){animation-delay:.15s}.fade-in:nth-child(4){animation-delay:.20s}

/* AI card */
.ai-kw-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:10px;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden}
.ai-kw-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.ai-kw-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--card-border,var(--border2))}
.ai-kw-card.cited{--card-border:var(--green)}
.ai-kw-card.has-ov{--card-border:var(--amber)}
.ai-kw-card.no-ov{--card-border:var(--border2)}
.ai-kw-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.ai-kw-name{font-family:var(--font-display);font-size:13px;font-weight:700;flex:1;letter-spacing:-.2px}
.ai-kw-badges{display:flex;gap:6px;flex-wrap:wrap}
.ai-kw-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px}
.ai-kw-meta-item{display:flex;flex-direction:column;gap:2px}
.ai-kw-meta-label{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ai-kw-meta-val{color:var(--text);font-family:var(--font-mono)}
.ai-kw-paa{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ai-kw-paa-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px}
.paa-item{font-size:11px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border)}
.paa-item:last-child{border-bottom:none}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:900px){.ai-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">SR</div>
    <div class="sb-site">studyriserr.com</div>
    <div class="sb-tagline">SEO Intelligence Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Overview</div>
    <a href="index.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>SEO Overview</a>
    <div class="sb-section">Analysis</div>
    <a href="targets.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Target Keywords</a>
    <a href="ai-overview.html" class="active"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>AI Overview</a>
    <div class="sb-section">Intelligence</div>
    <a href="seo-advice.html"><svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>SEO Advice</a>
  </nav>
  <div class="sb-footer">
    <div class="sb-updated" id="sb-updated">Loading...</div>
    <div class="sb-health"><div class="sb-health-label">Health Score</div><div class="sb-health-score" id="sb-score">—</div><div class="sb-health-sub" id="sb-label">—</div></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">🤖 AI Overview Tracker</div>
    <div><span class="refresh-badge"><span class="pulse"></span><span id="refresh-countdown">5:00</span></span></div>
  </div>
  <div class="content" id="page-content">
    <div class="loading"><div class="spinner"></div>Loading AI Overview data...</div>
  </div>
</div>

<script>
Chart.defaults.font.family="'DM Mono',monospace";Chart.defaults.font.size=11;Chart.defaults.color='#64748b';
let countdown=300;
setInterval(()=>{countdown--;if(countdown<=0){location.reload();return;}const m=Math.floor(countdown/60),s=countdown%60;const el=document.getElementById('refresh-countdown');if(el)el.textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);

function posBadge(pos){if(!pos&&pos!==0)return`<span class="pos-badge pos-low">—</span>`;const p=parseFloat(pos);const cls=p<=3?'pos-top3':p<=10?'pos-top10':p<=20?'pos-top20':'pos-low';return`<span class="pos-badge ${cls}">${p}</span>`;}

async function loadPage(){
  try{
    const[ai,or_]=await Promise.all([
      fetch('data/ai.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/overview.json?t='+Date.now()).then(r=>r.json()),
    ]);
    document.getElementById('sb-updated').textContent='Updated '+or_.updated;
    document.getElementById('sb-score').textContent=or_.health.score+'/100';
    document.getElementById('sb-label').textContent=or_.health.label;
    document.getElementById('sb-score').style.color=or_.health.score>=80?'#10b981':or_.health.score>=60?'#f59e0b':'#ef4444';
    render(ai);
  }catch(e){
    document.getElementById('page-content').innerHTML=`<div class="loading"><div style="font-size:32px">🤖</div><div>No AI Overview data yet. It runs every Monday automatically, or send <code>/aioverview</code> in Telegram.</div></div>`;
  }
}

function render(d){
  const s=d.summary||{};
  const kws=d.keywords||[];
  const cited=kws.filter(k=>k.site_cited);
  const hasOv=kws.filter(k=>k.has_overview&&!k.site_cited);
  const noOv=kws.filter(k=>!k.has_overview);

  document.getElementById('page-content').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card fade-in"><div class="stat-label">Checked</div><div class="stat-value">${s.total||0}</div><div class="stat-sub">keywords</div></div>
      <div class="stat-card fade-in"><div class="stat-label">AI Overview Exists</div><div class="stat-value" style="color:var(--amber)">${s.has_overview||0}</div><div class="stat-sub">${Math.round((s.has_overview||0)/(s.total||1)*100)}% of checked</div></div>
      <div class="stat-card green fade-in"><div class="stat-label">We're Cited</div><div class="stat-value" style="color:var(--green)">${s.cited||0}</div><div class="stat-sub">in AI answers</div></div>
      <div class="stat-card amber fade-in"><div class="stat-label">Not Cited</div><div class="stat-value" style="color:var(--amber)">${s.not_cited||0}</div><div class="stat-sub">opportunity</div></div>
      <div class="stat-card fade-in"><div class="stat-label">No AI Overview</div><div class="stat-value" style="color:var(--text-muted)">${s.no_overview||0}</div><div class="stat-sub">traditional results</div></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card fade-in">
        <div class="chart-title">🤖 AI Overview Status</div>
        <div class="chart-sub">citation breakdown across checked keywords</div>
        <div class="chart-wrap"><canvas id="aiChart"></canvas></div>
      </div>
      <div class="chart-card fade-in">
        <div class="chart-title">📍 Organic Position — Keywords with AI Overview</div>
        <div class="chart-sub">where we rank organically when AI Overview exists</div>
        <div class="chart-wrap"><canvas id="orgChart"></canvas></div>
      </div>
    </div>

    ${cited.length?`
    <div class="panel fade-in">
      <div class="panel-header">
        <span class="panel-title">🏆 We're Cited in AI Overview</span>
        <span class="panel-badge">${cited.length} keywords</span>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${cited.map(k=>aiCard(k,'cited')).join('')}
      </div>
    </div>`:''}

    ${hasOv.length?`
    <div class="panel fade-in">
      <div class="panel-header">
        <span class="panel-title">⚡ AI Overview Exists — Not Yet Cited</span>
        <span class="panel-badge">${hasOv.length} opportunities</span>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${hasOv.map(k=>aiCard(k,'has-ov')).join('')}
      </div>
    </div>`:''}

    <div class="panel fade-in">
      <div class="panel-header">
        <span class="panel-title">📋 Full AI Overview Report</span>
        <span class="panel-badge">${kws.length} keywords</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Seed</th><th>Checked Keyword</th><th>AI Overview</th>
            <th>Citation</th><th>Organic Pos</th><th>Opportunity</th><th>PAA Count</th>
          </tr></thead>
          <tbody>
            ${kws.map(k=>`
              <tr>
                <td class="mono">${k.seed||''}</td>
                <td class="bold">${k.ai_keyword||k.seed}</td>
                <td>${k.has_overview?'<span class="badge amber">✅ Yes</span>':'<span class="badge grey">❌ No</span>'}</td>
                <td>${k.site_cited?'<span class="badge green">🎯 Cited!</span>':k.has_overview?'<span class="badge amber">❌ Not cited</span>':'<span class="badge grey">—</span>'}</td>
                <td>${k.organic_pos?posBadge(k.organic_pos):'<span style="color:var(--text-dim);font-size:11px">Not ranking</span>'}</td>
                <td><span class="badge ${k.site_cited?'green':k.has_overview?'amber':'grey'}">${k.opportunity||'—'}</span></td>
                <td class="mono">${(k.paa||[]).length}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  // Charts
  new Chart(document.getElementById('aiChart'),{
    type:'doughnut',
    data:{
      labels:['Cited by AI','Has Overview (not cited)','No AI Overview'],
      datasets:[{data:[s.cited||0,s.not_cited||0,s.no_overview||0],backgroundColor:['#10b981','#f59e0b','#e2e8f0'],borderWidth:0,hoverOffset:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'right',labels:{padding:14,font:{size:11},color:'#64748b'}},
        tooltip:{backgroundColor:'#1e293b',titleColor:'#94a3b8',bodyColor:'#f8fafc'}}}
  });

  const orgData=kws.filter(k=>k.organic_pos&&k.has_overview);
  const orgBuckets={'1-3':0,'4-10':0,'11-20':0,'20+':0,'Not ranking':0};
  kws.filter(k=>k.has_overview).forEach(k=>{
    if(!k.organic_pos)orgBuckets['Not ranking']++;
    else if(k.organic_pos<=3)orgBuckets['1-3']++;
    else if(k.organic_pos<=10)orgBuckets['4-10']++;
    else if(k.organic_pos<=20)orgBuckets['11-20']++;
    else orgBuckets['20+']++;
  });
  new Chart(document.getElementById('orgChart'),{
    type:'bar',
    data:{
      labels:Object.keys(orgBuckets),
      datasets:[{label:'Keywords',data:Object.values(orgBuckets),
        backgroundColor:['#f59e0b','#10b981','#3b82f6','#ef4444','#94a3b8'],
        borderRadius:5,borderSkipped:false}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e293b',titleColor:'#94a3b8',bodyColor:'#f8fafc'}},
      scales:{y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8'}},x:{grid:{display:false},ticks:{color:'#64748b'}}}}
  });
}

function aiCard(k,type){
  return`
    <div class="ai-kw-card ${type}">
      <div class="ai-kw-top">
        <div class="ai-kw-name">${k.ai_keyword||k.seed}</div>
        <div class="ai-kw-badges">
          ${k.site_cited?'<span class="badge green">🎯 Cited</span>':'<span class="badge amber">⚡ Not cited</span>'}
          ${k.organic_pos?`<span class="badge blue">Pos #${k.organic_pos}</span>`:''}
        </div>
      </div>
      <div class="ai-kw-meta">
        <div class="ai-kw-meta-item"><span class="ai-kw-meta-label">Seed</span><span class="ai-kw-meta-val">${k.seed||'—'}</span></div>
        <div class="ai-kw-meta-item"><span class="ai-kw-meta-label">Sources cited</span><span class="ai-kw-meta-val">${k.cited_count||0}</span></div>
        <div class="ai-kw-meta-item" style="grid-column:span 2"><span class="ai-kw-meta-label">Opportunity</span><span class="ai-kw-meta-val">${k.opportunity||'—'}</span></div>
      </div>
      ${k.paa&&k.paa.length?`
        <div class="ai-kw-paa">
          <div class="ai-kw-paa-title">People Also Ask</div>
          ${k.paa.slice(0,3).map(q=>`<div class="paa-item">❓ ${q}</div>`).join('')}
        </div>`:''
      }
    </div>`;
}

loadPage();
</script>
</body>
</html>
